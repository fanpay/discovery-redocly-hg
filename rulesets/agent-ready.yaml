# =============================================================================
# Agent-Ready ruleset — Payment Services APIs
# =============================================================================
# The publish gate. A spec that passes this is clean enough for an autonomous
# AI agent to integrate against with no human spec-reading — which makes it
# precise enough for developers and credible enough for business stakeholders.
#
# Referenced in exactly one place each:
#   - root redocly.yaml `extends`           → daily lint and CI gate
#   - scorecardClassic `Agent-Ready` level  → the publish gate
# Edit the bar HERE; both consumers pick it up.
#
# Architecture: layers on top of Reference-Ready (openapi-rules.yaml).
# That file handles structural hygiene, security, descriptions, and naming.
# This file adds only what Reference-Ready does not cover: example presence.
# =============================================================================

extends:
  - ./openapi-rules.yaml

rules:
  # ---------------------------------------------------------------------------
  # Example presence (the real agent-readiness gap)
  # ---------------------------------------------------------------------------
  # Agents infer payload shapes from examples. Without an example on a required
  # scalar property, an agent must guess the value — and guesses fail.
  # recommended-strict ships this as a warning; we promote it to error.
  #
  # Coverage note: this rule covers required scalar properties. Nested objects
  # and arrays are NOT covered by any built-in configurable rule — a JS plugin
  # rule would be needed to extend coverage there. Deferred until a real spec
  # shows it's worth the added complexity.
  scalar-property-missing-example: error

  # ---------------------------------------------------------------------------
  # Operation-level examples
  # ---------------------------------------------------------------------------
  # Every operation should carry at least one request and one response example
  # so agents can construct real calls without guessing payload shapes.
  # These are warnings rather than errors because some operations (e.g. DELETE
  # with no body) legitimately have nothing to show.
  # NOTE: Declarative rules cannot assert example/examples presence inside a
  # MediaType — the `defined` assertion here only verifies that the RequestBody
  # object itself exists, not that it contains an example. Enforcing actual
  # example presence would require a JS plugin targeting the MediaType node.
  rule/operation-request-example:
    subject:
      type: RequestBody
    assertions:
      defined: true
    message: Request body is missing. Add a requestBody with at least one media-type example.
    severity: warn

  # NOTE: Same limitation applies here — `defined: true` on Response.content
  # confirms the content map is present, not that any MediaType inside it
  # carries an `example` or `examples` field.
  rule/response-example-defined:
    subject:
      type: Response
      property: content
    assertions:
      defined: true
    message: Response is missing content. Add at least one media-type with an example.
    severity: warn
