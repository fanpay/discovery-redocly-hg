openapi: 3.1.0
info:
  title: Example Product API
  version: 1.0.0
  description: >-
    Placeholder API used to prove the documentation pipeline end to end
    (lint -> scorecard -> publish -> MCP). Replace with the real pilot product
    spec; this file intentionally passes the Agent-Ready bar as a reference for
    what "good" looks like.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  contact:
    name: API Platform Team
    url: https://example.org/support
    email: api@example.org
servers:
  - url: https://api.example.org/v1
    description: Production server.
tags:
  - name: Widgets
    description: Read operations for widget resources.
security:
  - ApiKeyAuth: []
paths:
  /widgets:
    get:
      operationId: listWidgets
      summary: List widgets
      tags:
        - Widgets
      responses:
        '200':
          description: A list of widgets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Widget'
              example:
                - id: wdg_123
                  name: Sprocket
                  status: active
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: unauthorized
                message: Missing or invalid API key.
  /widgets/{widgetId}:
    get:
      operationId: getWidget
      summary: Get a widget by ID
      description: Returns a single widget identified by its unique ID.
      tags:
        - Widgets
      parameters:
        - name: widgetId
          in: path
          required: true
          description: Unique identifier of the widget.
          schema:
            type: string
            example: wdg_123
      responses:
        '200':
          description: The requested widget.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Widget'
              example:
                id: wdg_123
                name: Sprocket
                status: active
        '404':
          description: No widget exists with the given ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: not_found
                message: No widget found with that ID.
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key issued from the developer portal.
  schemas:
    Widget:
      type: object
      description: A widget resource.
      properties:
        id:
          type: string
          description: Unique identifier of the widget.
          example: wdg_123
        name:
          type: string
          description: Human-readable widget name.
          example: Sprocket
        status:
          type: string
          description: Lifecycle status of the widget.
          enum:
            - active
            - archived
          example: active
      required:
        - id
        - name
        - status
    Error:
      type: object
      description: Standard error payload returned on failure.
      properties:
        code:
          type: string
          description: Machine-readable error code.
          example: not_found
        message:
          type: string
          description: Human-readable error message.
          example: No widget found with that ID.
      required:
        - code
        - message
