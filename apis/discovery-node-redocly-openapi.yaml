openapi: 3.0.3
info:
  title: Discovery Store - Node API (Testing overwrite)
  version: 2.0.0
  description: A sample REST API exposing products, orders, and users resources.
  contact:
    name: API Support
    email: support@example.com
servers:
  - url: http://localhost:3000
    description: Local development
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Laptop Pro
        price:
          type: number
          format: float
          example: 1299.99
        category:
          type: string
          example: electronics
        stock:
          type: integer
          example: 45
    ProductInput:
      type: object
      required:
        - name
        - price
        - category
      properties:
        name:
          type: string
          example: Keyboard
        price:
          type: number
          format: float
          example: 79.99
        category:
          type: string
          example: electronics
        stock:
          type: integer
          example: 100
    Order:
      type: object
      properties:
        id:
          type: integer
          example: 1
        customerId:
          type: integer
          example: 42
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
                example: 1
              qty:
                type: integer
                example: 2
              unitPrice:
                type: number
                format: float
                example: 29.99
        status:
          type: string
          enum:
            - pending
            - shipped
            - delivered
            - cancelled
          example: pending
        total:
          type: number
          format: float
          example: 59.98
    OrderInput:
      type: object
      required:
        - customerId
        - items
      properties:
        customerId:
          type: integer
          example: 42
        items:
          type: array
          items:
            type: object
            required:
              - productId
              - qty
            properties:
              productId:
                type: integer
                example: 1
              qty:
                type: integer
                example: 2
              unitPrice:
                type: number
                format: float
                example: 29.99
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Alice Martin
        email:
          type: string
          format: email
          example: alice@example.com
        role:
          type: string
          enum:
            - admin
            - customer
          example: customer
    UserInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: Carlos López
        email:
          type: string
          format: email
          example: carlos@example.com
        role:
          type: string
          enum:
            - admin
            - customer
          example: customer
    Review:
      type: object
      properties:
        id:
          type: integer
          example: 1
        productId:
          type: integer
          example: 1
        userId:
          type: integer
          example: 2
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 4
        comment:
          type: string
          example: Great product!
        createdAt:
          type: string
          format: date-time
          example: '2026-01-10T09:00:00Z'
    ReviewInput:
      type: object
      required:
        - productId
        - userId
        - rating
      properties:
        productId:
          type: integer
          example: 1
        userId:
          type: integer
          example: 2
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 4
        comment:
          type: string
          example: Great product!
    Error:
      type: object
      properties:
        message:
          type: string
          example: Resource not found
paths:
  /status:
    get:
      summary: API status and version info
      tags:
        - General
      responses:
        '200':
          description: Current API status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 2.0.0
                  message:
                    type: string
                    example: Discovery Store - Node API is running
  /users:
    get:
      summary: List all users
      tags:
        - Users
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      summary: Create a new user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/{id}:
    get:
      summary: Get a user by ID
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /reviews:
    get:
      summary: List all reviews
      tags:
        - Reviews
      parameters:
        - in: query
          name: productId
          schema:
            type: integer
          description: Filter reviews by product
        - in: query
          name: userId
          schema:
            type: integer
          description: Filter reviews by user
      responses:
        '200':
          description: A list of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
    post:
      summary: Submit a review for a product
      tags:
        - Reviews
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewInput'
      responses:
        '201':
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /reviews/{id}:
    get:
      summary: Get a review by ID
      tags:
        - Reviews
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Review found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a review
      tags:
        - Reviews
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Review deleted
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /products:
    get:
      summary: List all products
      tags:
        - Products
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category
      responses:
        '200':
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      summary: Create a new product
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /products/{id}:
    get:
      summary: Get a product by ID
      tags:
        - Products
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /orders:
    get:
      summary: List all orders
      tags:
        - Orders
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - pending
              - shipped
              - delivered
              - cancelled
          description: Filter by order status
      responses:
        '200':
          description: A list of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
    post:
      summary: Place a new order
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
      responses:
        '201':
          description: Order placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /orders/{id}:
    get:
      summary: Get an order by ID
      tags:
        - Orders
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
tags: []
