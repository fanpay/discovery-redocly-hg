  /customers:
    post:
      operationId: createCustomer
      summary: Create a customer record
      description: 'Creates a new customer profile and optionally vaults one or more payment methods in a single

        call. All profile fields (`firstName`, `lastName`, `address`, etc.) are optional — you may

        create a minimal customer record and associate payment methods later via `POST /paymentmethods`.

        If `paymentMethods` is supplied, each entry is vaulted and the first `paymentMethodId` is

        returned in the response. Returns a numeric `customerId` used to reference this customer in

        payment and subscription calls.'
      tags:
      - Customers
      parameters:
      - $ref: '#/components/parameters/merchantToken'
      - $ref: '#/components/parameters/requestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
            examples:
              withCard:
                summary: Create customer with card
                value:
                  firstName: Jane
                  lastName: Doe
                  address: 123 Main St
                  city: Springfield
                  state: IL
                  postalCode: '12345'
                  country: US
                  phone: 555-867-5309
                  email: jane.doe@example.com
                  paymentMethods:
                  - card:
                      card: '4111111111111111'
                      expiry: 11/26
                      cvv: '737'
                      accNickName: Primary Card
                      isActive: true
      responses:
        '200':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
              examples:
                created:
                  summary: Customer created
                  value:
                    customerId: 98765
                    paymentMethodId: c9d8e7f6-a5b4-3c2d-1e0f-9a8b7c6d5e4f
                    requestId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
