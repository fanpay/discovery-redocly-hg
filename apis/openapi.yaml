  /customers/{customerId}:
    get:
      operationId: getCustomer
      summary: Retrieve a specific customer
      description: 'Returns the full profile for a single customer identified by the numeric `customerId`, including

        all associated `vaults` (stored payment methods) and `subscriptions`. Returns 404 if the

        `customerId` does not exist or does not belong to the merchant identified by `merchantToken`.'
      tags:
      - Customers
      parameters:
      - $ref: '#/components/parameters/merchantToken'
      - $ref: '#/components/parameters/requestId'
      - name: customerId
        in: path
        required: true
        schema:
          type: integer
        description: Unique customer identifier
      responses:
        '200':
          description: Customer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerRecord'
              examples:
                customer:
                  summary: Customer with vaults and subscriptions
                  value:
                    customerId: 98765
                    firstName: Jane
                    lastName: Doe
                    address: 123 Main St
                    city: Springfield
                    state: IL
                    postalCode: '12345'
                    country: US
                    phone: 555-867-5309
                    email: jane.doe@example.com
                    vaults:
                    - paymentMethodId: c9d8e7f6-a5b4-3c2d-1e0f-9a8b7c6d5e4f
                      accNickName: Primary Card
                      isActive: true
                    subscriptions:
                    - subscriptionId: b2c3d4e5-f6a7-8901-bcde-f12345678901
                      frequency: Monthly
                      amount: 29.99
                      active: true
                      startDate: 02/01/2024
                      endDate: 02/01/2025
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
        '406':
          description: Not Acceptable
        '408':
          description: Request Timeout
        '415':
          description: Unsupported Media Type
        '429':
          description: Too Many Requests
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Not Implemented
        '503':
          description: Service Unavailable
        '504':
          description: Gateway Timeout
        '505':
          description: HTTP Version Not Supported
        '506':
          description: Variant Also Negotiates
        '507':
          description: Insufficient Storage
        '508':
          description: Loop Detected
        '510':
          description: Not Extended
        '511':
          description: Network Authentication Required
    patch:
      operationId: modifyCustomer
      summary: Modify a customer record
      description: 'Updates profile fields on an existing customer record. All fields are optional — supply only

        what needs to change. Does not affect associated payment methods or subscriptions; use

        `PATCH /paymentmethods/{paymentMethodId}` and `PATCH /subscriptions/{subscriptionId}` for those.

        Returns 404 if the customer does not exist.'
      tags:
      - Customers
      parameters:
      - $ref: '#/components/parameters/merchantToken'
      - $ref: '#/components/parameters/requestId'
      - name: customerId
        in: path
        required: true
        schema:
          type: integer
        description: Unique customer identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyCustomerRequest'
            examples:
              update:
                summary: Update customer profile
                value:
                  firstName: Jane
                  lastName: Smith
                  address: 456 Oak Ave
                  city: Chicago
                  state: IL
                  postalCode: '60601'
                  country: US
                  email: jane.smith@example.com
      responses:
        '200':
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifyCustomerResponse'
              examples:
                updated:
                  summary: Customer updated
                  value:
                    customerId: 98765
                    requestId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        '400':
