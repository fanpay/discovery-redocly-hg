components:
  securitySchemes:
    oauth2ClientCredentials:
      type: oauth2
      description: 'Use the **Client Credentials** flow. Enter your `client_id` and `client_secret` to obtain a bearer token.


        > ⚠️ **Important:** The token endpoint requires credentials sent as a **Basic Auth header**

        > (`Authorization: Basic base64(client_id:client_secret)`). Enable this option in the

        > Redocly auth dialog under *"Client Authentication"* → **Send as Basic Auth header**.


        The scope `api_scope` is automatically included.'
      flows:
        clientCredentials:
          tokenUrl: https://sandbox.api.example.com/oauth2/token
          scopes:
            api_scope: Access to Payment Services API
  parameters:
    merchantToken:
      name: merchantToken
      in: header
      required: true
      description: Unique Merchant Identifier (GUID)
      schema:
        type: string
        pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    requestId:
      name: requestId
      in: header
      required: false
      description: Unique trace ID for the request (GUID)
      schema:
        type: string
        pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
  schemas:
    Address:
      type: object
      required:
      - postalCode
      properties:
        firstName:
          description: First name of the cardholder or account holder.
          type: string
          maxLength: 100
        lastName:
          description: Last name of the cardholder or account holder.
          type: string
          maxLength: 100
        address:
          description: Primary street address line.
          type: string
          maxLength: 250
        address2:
          description: Secondary address line (suite, apartment, etc.).
          type: string
          maxLength: 100
        city:
          description: City name.
          type: string
          maxLength: 50
        state:
          description: State or province code.
          type: string
          maxLength: 25
        country:
          description: Country code (e.g. US, CA).
          type: string
          maxLength: 25
        postalCode:
          description: Postal or ZIP code.
          type: string
          maxLength: 50
        phone:
          description: Contact phone number in E.164 or NANP format.
          type: string
          maxLength: 17
          pattern: ^(\+\d{1,3}[\s-]?)?\(?\d{3}\)?[\s-]?\d{3}[\s-]?\d{4}$
        email:
          description: Contact email address.
          type: string
          format: email
          maxLength: 250
    AmountObject:
      type: object
      required:
      - amount
      properties:
        amount:
          type: number
          description: Amount of the transaction
        currency:
          type: string
          enum:
          - USD
          - CAD
          description: Currency of transaction
    FeeObject:
      type: object
      properties:
        feeAmount:
          description: Flat fee amount charged on the transaction.
          type: number
        feeAuthResponse:
          description: Authorization result for the fee transaction, if the fee was processed as a separate auth. Null if
            no separate fee auth occurred.
          type: string
          nullable: true
    AlternateFee:
      type: object
      properties:
        feeType:
          description: Category or label identifying the type of fee (e.g. surcharge).
          type: string
        feePercent:
          description: Fee rate expressed as a decimal percentage (e.g. 0.025 = 2.5%).
          type: number
        amount:
          description: Calculated fee amount in the transaction currency.
          type: number
        waived:
          description: True if the surcharge was calculated but waived (not charged).
          type: boolean
        addedToTotalAmount:
          description: True if the surcharge was rolled into the total amount charged to the cardholder; false if reported
            separately.
          type: boolean
    PartnerFee:
      type: object
      properties:
        amount:
          description: Partner fee amount in the transaction currency.
          type: number
        feeType:
          description: Category or label identifying the type of partner fee.
          type: string
    Level2Data:
      type: object
      properties:
        customerRefNumber:
          description: Customer or purchase order reference number for Level 2 interchange.
          type: string
        localTaxFlag:
          description: True if local tax applies to this transaction.
          type: boolean
        purchaseCard:
          description: True if the card is classified as a purchasing/procurement card eligible for Level 2/3 interchange.
          type: boolean
        shippingZip:
          description: Destination ZIP code for the shipment, used in Level 2 data.
          type: string
        taxAmount:
          description: Tax amount included in the transaction total for Level 2 data.
          type: number
    Level3Data:
      type: object
      properties:
        description:
          description: Textual description of the line item.
          type: string
          maxLength: 250
        skuCode:
          description: Stock-keeping unit code identifying the line-item product.
          type: string
          maxLength: 100
        unitCost:
          description: Per-unit cost of the line item.
          type: number
        price:
          description: Extended line-item price (unit cost × quantity).
          type: number
        quantity:
          description: Number of units for this line item.
          type: number
        commodityCode:
          description: Industry commodity code classifying the product category.
          type: string
          maxLength: 12
        unitOfMeasure:
          description: Unit of measure for the line item (e.g. EA, LB, HR).
          type: string
          maxLength: 50
        freightAmount:
          description: Freight/shipping charge allocated to this line item.
          type: number
        dutyAmount:
          description: Import duty or customs charge for this line item.
          type: number
        itemDiscountAmount:
          description: Discount amount applied to this line item.
          type: number
        itemDiscountRate:
          description: Discount rate for this line item expressed as a decimal.
          type: number
        taxAmount:
          description: Tax amount for this line item.
          type: number
    CustomData:
      type: object
      properties:
        name:
          description: Name key of the custom data name/value pair.
          type: string
        value:
          description: Value of the custom data name/value pair.
          type: string
    OrderData:
      type: object
      required:
      - orderId
      properties:
        orderId:
          description: Merchant-assigned order identifier used to correlate this transaction to an order.
          type: string
        autoGenerateOrderId:
          description: When true, the platform generates a unique order ID automatically; `orderId` is ignored.
          type: boolean
        orderIdIsUnique:
          description: When true, the platform rejects the transaction if the same `orderId` has already been used — prevents
            duplicate order processing.
          type: boolean
    ErrorResponse:
      type: object
      properties:
        errors:
          type: object
          properties:
            message:
              description: Human-readable error message describing the failure.
              type: string
            details:
              description: Additional technical detail or context for the error.
              type: string
    CardPaymentMethod:
      type: object
      required:
      - card
      properties:
        card:
          description: Card credentials — PAN, expiry, and optional CVV.
          type: object
          required:
          - card
          - expiry
          properties:
            card:
              type: string
              minLength: 12
              maxLength: 19
              description: Card Number
            expiry:
              type: string
              pattern: ^(0[1-9]|1[0-2])\/\d{2}$
              description: Card Expiration MM/YY
            cvv:
              type: string
              minLength: 3
              maxLength: 4
              description: Card CVV/Security Code
        billingAddress:
          $ref: '#/components/schemas/Address'
        accNickName:
          description: Optional friendly label for this payment method in the vault.
          type: string
        isActive:
          description: True if this vaulted payment method is active and available for use.
          type: boolean
    AchPaymentMethod:
      type: object
      required:
      - ach
      properties:
        ach:
          type: object
          required:
          - accountNumber
          - routingNumber
          properties:
            accountNumber:
              description: Bank account number for the ACH transaction.
              type: string
              minLength: 7
              maxLength: 20
            routingNumber:
              description: ABA routing transit number identifying the financial institution.
              type: string
              minLength: 8
              maxLength: 9
            accountType:
              description: 'Bank account type. Values: `Checking`, `Savings`.'
              type: string
              enum:
              - Checking
              - Savings
        billingAddress:
          $ref: '#/components/schemas/Address'
        accNickName:
          description: Optional friendly label for this payment method in the vault.
          type: string
        isActive:
          description: True if this vaulted payment method is active and available for use.
          type: boolean
    TokenPaymentMethod:
      type: object
      required:
      - token
      properties:
        token:
          type: object
          required:
          - token
          - expiry
          properties:
            token:
              type: string
              maxLength: 20
              description: Tokenized string for Card details
            expiry:
              type: string
              description: Card Expiration Month and Year
            cvv:
              description: Card CVV/security code accompanying the token.
              type: string
              minLength: 3
              maxLength: 4
        billingAddress:
          $ref: '#/components/schemas/Address'
    VaultPaymentMethod:
      type: object
      required:
      - vault
      properties:
        vault:
          type: object
          required:
          - paymentMethodId
          properties:
            paymentMethodId:
              description: UUID of the vaulted payment method to charge.
              type: string
              pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
            cvv:
              description: Card CVV/security code accompanying the vault token.
              type: string
              minLength: 3
              maxLength: 4
        billingAddress:
          $ref: '#/components/schemas/Address'
    CryptogramPaymentMethod:
      type: object
      required:
      - cryptogram
      properties:
        cryptogram:
          type: object
          required:
          - cryptogram
          properties:
            cryptogram:
              type: string
              description: Tokenized string that passes Card or Bank details
        billingAddress:
          $ref: '#/components/schemas/Address'
    NetworkTokenPaymentMethod:
      type: object
      required:
      - networkToken
      properties:
        networkToken:
          type: object
          required:
          - token
          - expiryMonth
          - expiryYear
          - secureCavvData
          - tokenSource
          properties:
            token:
              description: Network token (PAN substitute) issued by the card network for this digital wallet payment.
              type: string
              minLength: 13
              maxLength: 20
            expiryMonth:
              description: Expiry month of the network token (1–12).
              type: string
              pattern: ^(0?[1-9]|1[0-2])$
            expiryYear:
              description: Four-digit expiry year of the network token.
              type: string
              pattern: ^(202[4-9]|20[3-9]\d|2[1-9]\d{2})$
            secureCavvData:
              description: Cryptogram Authentication Verification Value — the cryptographic proof from the digital wallet
                (Apple Pay, Google Pay, Paze) that authenticates the network token.
              type: string
            eci:
              description: Electronic Commerce Indicator — indicates the authentication level of the digital wallet transaction
                (e.g. `05` = fully authenticated, `06` = attempted).
              type: string
              maxLength: 2
            tokenType:
              description: Network token type code (integer 1–9) as defined by the card network.
              type: number
              minimum: 1
              maximum: 9
            tokenSource:
              description: 'Digital wallet provider that issued the network token. Values: `APPLEPAY`, `GOOGLEPAY`, `PAZE`,
                `VISA`.'
              type: string
              enum:
              - APPLEPAY
              - GOOGLEPAY
              - PAZE
              - VISA
        billingAddress:
          $ref: '#/components/schemas/Address'
    AchTokenPaymentMethod:
      type: object
      required:
      - achToken
      properties:
        achToken:
          type: object
          required:
          - token
          properties:
            token:
              type: string
              maxLength: 40
              description: Tokenized string for ACH details
        billingAddress:
          $ref: '#/components/schemas/Address'
    FleetCardPaymentMethod:
      type: object
      required:
      - fleetCard
      - sequenceNumber
      - odometer
      - driversLicenseNumber
      properties:
        fleetCard:
          type: object
          required:
          - card
          - expiry
          additionalProperties: false
          properties:
            card:
              description: Fleet card number (12–19 digits).
              type: string
              minLength: 12
              maxLength: 19
            expiry:
              description: Fleet card expiration date in MM/YY format.
              type: string
              pattern: ^(0[1-9]|1[0-2])\/\d{2}$
        sequenceNumber:
          description: Five-digit driver or vehicle sequence number for fleet card transactions.
          type: string
          minLength: 5
          maxLength: 5
          pattern: ^\d{5}$
        odometer:
          description: Odometer reading at the time of the fleet transaction.
          type: string
          minLength: 1
          maxLength: 9
        driversLicenseNumber:
          description: Driver's license number associated with the fleet card transaction.
          type: string
          minLength: 1
          maxLength: 15
        accNickName:
          description: Optional friendly label for this payment method in the vault.
          type: string
        isActive:
          description: True if this vaulted payment method is active and available for use.
          type: boolean
    PaymentMethodInput:
      description: Exactly one payment method type must be provided.
      oneOf:
      - title: Card
        type: object
        required:
        - card
        properties:
          card:
            $ref: '#/components/schemas/CardPaymentMethod'
        additionalProperties: false
      - title: ACH
        type: object
        required:
        - ach
        properties:
          ach:
            $ref: '#/components/schemas/AchPaymentMethod'
        additionalProperties: false
      - title: Token
        type: object
        required:
        - token
        properties:
          token:
            $ref: '#/components/schemas/TokenPaymentMethod'
        additionalProperties: false
      - title: Vault
        type: object
        required:
        - vault
        properties:
          vault:
            $ref: '#/components/schemas/VaultPaymentMethod'
        additionalProperties: false
      - title: Cryptogram
        type: object
        required:
        - cryptogram
        properties:
          cryptogram:
            $ref: '#/components/schemas/CryptogramPaymentMethod'
        additionalProperties: false
      - title: Network Token
        type: object
        required:
        - networkToken
        properties:
          networkToken:
            $ref: '#/components/schemas/NetworkTokenPaymentMethod'
        additionalProperties: false
      - title: ACH Token
        type: object
        required:
        - achToken
        properties:
          achToken:
            $ref: '#/components/schemas/AchTokenPaymentMethod'
        additionalProperties: false
      - title: Fleet Card
        type: object
        required:
        - fleetCard
        properties:
          fleetCard:
            $ref: '#/components/schemas/FleetCardPaymentMethod'
        additionalProperties: false
    PaymentRequest:
      type: object
      required:
      - amount
      - paymentMethod
      properties:
        paymentType:
          description: Transaction type label (e.g. Sale, Debit) for categorization.
          type: string
        amount:
          $ref: '#/components/schemas/AmountObject'
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethodInput'
        orderId:
          description: Merchant-assigned order identifier; auto-generated if omitted.
          type: string
        customerId:
          description: Numeric ID of an existing customer record to associate with this transaction.
          type: integer
        level2:
          $ref: '#/components/schemas/Level2Data'
        level3:
          type: array
          items:
            $ref: '#/components/schemas/Level3Data'
        customData:
          description: Optional custom name/value pairs to attach to this transaction for reporting or integration metadata.
          type: array
          items:
            $ref: '#/components/schemas/CustomData'
        surcharge:
          $ref: '#/components/schemas/AlternateFee'
        partnerFee:
          $ref: '#/components/schemas/PartnerFee'
        merchantCategory:
          description: Merchant category code (MCC) associated with this merchant.
          type: string
        isSavePaymentMethod:
          description: When true, the payment method used is automatically vaulted and `vaultCreated` will be true in the
            response.
          type: boolean
        isCustomRecurring:
          description: When true, marks this transaction as a custom (non-standard) recurring payment.
          type: boolean
        isReturnCustomData:
          description: When true, the `customData` name/value pairs submitted with the request are echoed back in the response.
          type: boolean
        deviceId:
          description: ID of the EMV terminal to use for card-present transactions.
          type: string
        paymentCompleteDate:
          description: ISO 8601 timestamp of when the payment was finalized/captured.
          type: string
        orderData:
          $ref: '#/components/schemas/OrderData'
    RefundRequest:
      type: object
      required:
      - paymentId
      properties:
        paymentId:
          description: UUID of the original payment to refund.
          type: string
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        isACH:
          description: Set to true when refunding an ACH payment.
          type: boolean
        amount:
          $ref: '#/components/schemas/AmountObject'
        orderData:
          $ref: '#/components/schemas/OrderData'
    CreditRequest:
      type: object
      required:
      - amount
      - paymentMethod
      properties:
        amount:
          $ref: '#/components/schemas/AmountObject'
        paymentMethod:
          type: object
          required:
          - ach
          properties:
            ach:
              $ref: '#/components/schemas/AchPaymentMethod'
    StandaloneRefundRequest:
      type: object
      required:
      - amount
      - paymentMethod
      properties:
        amount:
          $ref: '#/components/schemas/AmountObject'
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethodInput'
    RefundUnion:
      oneOf:
      - $ref: '#/components/schemas/RefundRequest'
      - $ref: '#/components/schemas/CreditRequest'
      - $ref: '#/components/schemas/StandaloneRefundRequest'
      description: 'One of: RefundRequest, CreditRequest, StandaloneRefundRequest'
    CreatePaymentMethodRequest:
      type: object
      required:
      - paymentMethod
      properties:
        customerId:
          description: Numeric ID of the customer to associate this payment method with.
          type: number
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethodInput'
    CreateCustomerRequest:
      type: object
      required:
      - firstName
      properties:
        firstName:
          description: First name of the customer.
          type: string
        lastName:
          description: Last name of the customer.
          type: string
        address:
          description: Primary street address of the customer.
          type: string
        address2:
          description: Secondary address line (suite, apartment, etc.).
          type: string
        postalCode:
          description: Postal or ZIP code of the customer.
          type: string
        city:
          description: City of the customer.
          type: string
        state:
          description: State or province code of the customer.
          type: string
        country:
          description: Country code of the customer (e.g. US, CA).
          type: string
        phone:
          description: Contact phone number of the customer.
          type: string
        email:
          description: Contact email address of the customer.
          type: string
        paymentMethods:
          type: array
          items:
            $ref: '#/components/schemas/PaymentMethodInput'
    ModifyCustomerRequest:
      type: object
      required:
      - firstName
      properties:
        firstName:
          description: Updated first name of the customer.
          type: string
        lastName:
          description: Updated last name of the customer.
          type: string
        address:
          description: Updated primary street address of the customer.
          type: string
        address2:
          description: Updated secondary address line.
          type: string
        postalCode:
          description: Updated postal or ZIP code of the customer.
          type: string
        city:
          description: Updated city of the customer.
          type: string
        state:
          description: Updated state or province code.
          type: string
        country:
          description: Updated country code of the customer.
          type: string
        phone:
          description: Updated contact phone number.
          type: string
        email:
          description: Updated contact email address.
          type: string
    PaymentResponse:
      type: object
      properties:
        paymentId:
          description: Unique identifier for this transaction. Pass this value to cancel, capture, refund, and search operations.
          type: string
        requestId:
          description: Unique identifier for this API request, used for idempotency and support tracing.
          type: string
        authResponse:
          description: 'Processor authorization result. Values: `APPROVED`, `DECLINED`, `VOIDED`, `CAPTURED`, `PENDING` (ACH
            only), `ERROR`.'
          type: string
        responseCode:
          description: Processor response code. `0` = approved; non-zero values indicate specific decline or error types.
          type: string
        responseMessage:
          description: Human-readable message from the processor describing the authorization result.
          type: string
        amountApproved:
          description: Amount approved by the processor, which may differ from the requested amount for partial approvals.
          type: number
        isPartial:
          description: True if only part of the requested amount was approved by the processor.
          type: boolean
        orderId:
          description: Order identifier associated with this transaction. Null if not provided and not auto-generated.
          type: string
          nullable: true
        customerId:
          description: Numeric ID of the associated customer record. Null if no customer is linked.
          type: integer
          nullable: true
        batchNumber:
          description: Identifier of the settlement batch this transaction belongs to. Null until the transaction is settled
            via `POST /batches`.
          type: string
          nullable: true
        subscriptionId:
          description: UUID of the subscription this transaction belongs to, if applicable.
          type: string
          nullable: true
        fee:
          $ref: '#/components/schemas/FeeObject'
        token:
          description: Platform vault token representing the payment method used. Can be passed as a `TokenPaymentMethod`
            in future payment calls. Null for ACH transactions.
          type: string
          nullable: true
        accountResponseData:
          description: AVS and CVV verification result codes returned by the processor.
          type: object
          properties:
            avs:
              description: AVS (Address Verification Service) result code returned by the processor.
              type: string
            cvv:
              description: CVV verification result code returned by the processor.
              type: string
        customData:
          description: Custom name/value pairs submitted with the request, echoed back when isReturnCustomData is true.
          type: array
          items:
            $ref: '#/components/schemas/CustomData'
    RefundResponse:
      type: object
      properties:
        paymentId:
          description: UUID of the refund transaction.
          type: string
        parentPaymentId:
          description: The `paymentId` of the original transaction this refund is applied against. Null for standalone refunds.
          type: string
          nullable: true
        requestId:
          description: Unique identifier for this API request.
          type: string
        orderId:
          description: Order identifier associated with this refund. Null if not provided.
          type: string
          nullable: true
        amountApproved:
          description: Amount approved for the refund.
          type: number
        batchNumber:
          description: Settlement batch number this refund belongs to. Null until settled.
          type: string
          nullable: true
        authResponse:
          description: 'Processor authorization result for the refund. Values: `APPROVED`, `DECLINED`, `ERROR`.'
          type: string
        responseCode:
          description: Processor response code for the refund operation.
          type: string
        responseMessage:
          description: Human-readable message from the processor describing the refund result.
          type: string
        isPartial:
          description: True if only part of the requested refund amount was approved.
          type: boolean
        fee:
          $ref: '#/components/schemas/FeeObject'
        customerId:
          description: Numeric ID of the customer associated with this refund.
          type: integer
        accountResponseData:
          description: AVS and CVV verification result codes returned by the processor.
          type: object
          properties:
            avs:
              description: AVS result code returned by the processor.
              type: string
            cvv:
              description: CVV verification result code returned by the processor.
              type: string
        subscriptionId:
          description: UUID of the subscription this refund is associated with, if applicable.
          type: string
        token:
          description: Vault token representing the payment method used for the refund.
          type: string
    PaymentMethodResponse:
      type: object
      properties:
        paymentMethodId:
          description: UUID of the newly created or updated vaulted payment method.
          type: string
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        customerId:
          description: Numeric ID of the customer associated with this payment method. Null if not linked.
          type: integer
          nullable: true
        requestId:
          description: Unique identifier for this API request.
          type: string
    CustomerResponse:
      type: object
      properties:
        customerId:
          description: Numeric ID of the newly created customer record.
          type: integer
        paymentMethodId:
          description: Array of UUIDs of vaulted payment methods associated with this customer. Null if none.
          type: array
          items:
            type: string
          nullable: true
        requestId:
          description: Unique identifier for this API request.
          type: string
    VaultRecord:
      type: object
      properties:
        paymentMethodId:
          description: UUID of this vaulted payment method.
          type: string
        accNickName:
          description: Optional friendly label assigned to this payment method.
          type: string
        isActive:
          description: True if this vaulted payment method is active and available for use.
          type: boolean
        cardType:
          description: Card network/brand of the vaulted card.
          type: string
        maskedPan:
          description: Card number with middle digits masked. Shows first 6 and last 4 digits (e.g. `411111XXXXXX1111`). Length
            varies by card brand.
          type: string
        expiry:
          description: Card expiration date in MM/YY format.
          type: string
        token:
          description: Platform vault token representing this payment method.
          type: string
          maxLength: 16
        accountNumber:
          description: Masked ACH bank account number for this vaulted entry.
          type: string
        routingNumber:
          description: ABA routing transit number for this vaulted ACH entry.
          type: string
        accountType:
          description: 'Bank account type for ACH entries. Values: `Checking`, `Savings`.'
          type: string
          enum:
          - Checking
          - Savings
        vaultCreated:
          description: True if a new vault entry was created as a side effect of the transaction (e.g. when `isSavePaymentMethod`
            is true).
          type: string
        sequenceNumber:
          description: Fleet card driver/vehicle sequence number for this vaulted fleet entry.
          type: string
        odometer:
          description: Odometer reading stored for this vaulted fleet entry.
          type: string
        driversLicenseNumber:
          description: Driver's license number stored for this vaulted fleet entry.
          type: string
        billingAddress:
          $ref: '#/components/schemas/Address'
    CustomerRecord:
      type: object
      properties:
        customerId:
          description: Unique numeric identifier for this customer.
          type: integer
        firstName:
          description: First name of the customer.
          type: string
        lastName:
          description: Last name of the customer.
          type: string
        address:
          description: Primary street address of the customer.
          type: string
        address2:
          description: Secondary address line of the customer.
          type: string
        city:
          description: City of the customer.
          type: string
        postalCode:
          description: Postal or ZIP code of the customer.
          type: string
        state:
          description: State or province code of the customer.
          type: string
        country:
          description: Country code of the customer.
          type: string
        phone:
          description: Contact phone number of the customer.
          type: string
        email:
          description: Contact email address of the customer.
          type: string
        vaults:
          description: Array of vaulted payment methods associated with this customer.
          type: array
          items:
            $ref: '#/components/schemas/VaultRecord'
        subscriptions:
          description: Array of active and inactive subscriptions for this customer.
          type: array
          items:
            type: object
            properties:
              subscriptionId:
                description: UUID of this subscription.
                type: string
              frequency:
                description: Billing frequency of this subscription.
                type: string
              amount:
                description: Per-cycle charge amount for this subscription.
                type: number
              active:
                description: True if this subscription is currently active.
                type: boolean
              startDate:
                type: string
                description: Subscription start date (MM/DD/YYYY)
                pattern: ^\d{2}/\d{2}/\d{4}$
                example: 02/01/2024
              endDate:
                type: string
                description: Subscription end date (MM/DD/YYYY)
                pattern: ^\d{2}/\d{2}/\d{4}$
                example: 02/01/2025
    CustomerListResponse:
      type: array
      items:
        $ref: '#/components/schemas/CustomerRecord'
    ModifyCustomerResponse:
      type: object
      properties:
        customerId:
          description: Numeric ID of the updated customer record.
          type: integer
        requestId:
          description: Unique identifier for this API request.
          type: string
