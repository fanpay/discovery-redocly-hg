openapi: 3.0.3
info:
  title: Payment Services API
  version: 1.0.0
  description: "## Overview\n\nThe Payment Services API is a REST-based payment platform designed to support a wide range\
    \ of payment methods and transaction types.\n\nThe API uses predictable, resource-oriented URLs, accepts JSON request\
    \ bodies, and returns JSON responses. Standard HTTP response codes, authentication mechanisms, and verbs are used throughout.\n\
    \n---\n\n## Authentication\n\nThe Payment Services API uses **OAuth 2.0 Client Credentials** to authenticate requests.\
    \ All API calls must include a valid bearer token in the `Authorization` header.\n\nStep 1 — Request a token\n\nExchange\
    \ your `client_id` and `client_secret` for a bearer token. Credentials are sent as a **Basic Auth header** (`Authorization:\
    \ Basic base64(client_id:client_secret)`).\n\n```bash\ncurl -X POST https://sandbox.api.example.com/oauth2/token \\\n\
    \  -H \"Authorization: Basic BASE64_CLIENT_ID_SECRET\" \\\n  -H \"Content-Type: application/x-www-form-urlencoded\" \\\
    \n  -d \"grant_type=client_credentials&scope=api_scope\"\n```\n\n**Response:**\n\n```json\n{\n  \"access_token\": \"eyJhbGciOiJSUzI1NiIsInR5...\"\
    ,\n  \"token_type\": \"Bearer\",\n  \"expires_in\": 3600,\n  \"scope\": \"api_scope\"\n}\n```\n\nStep 2 — Authenticate\
    \ requests\n\nPass the token in the `Authorization` header on every API request. Tokens expire after **3600 seconds**\
    \ — request a new one when it expires.\n\n```bash\ncurl -X POST https://sandbox.api.example.com/v1/payments \\\n  -H \"\
    Authorization: Bearer eyJhbGciOiJSUzI1NiIsInR5...\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"merchantToken:\
    \ YOUR_PARTNER_TOKEN\"\n```\n\nRequired headers\n\n| Header | Required | Description |\n|--------|----------|-------------|\n\
    | `Authorization` | ✓ | `Bearer {access_token}` from the token endpoint |\n| `Content-Type` | ✓ | Always `application/json`\
    \ |\n| `merchantToken` | ✓ | Your unique Merchant Identifier (GUID) |\n| `requestId` | | Optional trace ID (UUID) for\
    \ idempotency and debugging |\n\n### Environments\n\n| Environment | Base URL | Token URL |\n|-------------|----------|-----------|\n\
    | Sandbox | `https://sandbox.api.example.com/v1` | `https://sandbox.api.example.com/oauth2/token` |\n| Production | `https://api.example.com/v1`\
    \ | `https://api.example.com/oauth2/token` |\n\nYour `client_id` and `client_secret` determine the environment — sandbox\
    \ credentials only work against the sandbox base URL.\n\n---\n\n## Errors\n\nThe API uses standard HTTP status codes.\
    \ Errors return a JSON body with `code`, `message`, and optional `details`.\n\n| Code | Meaning |\n|------|---------|\n\
    | `200` | Success |\n| `400` | Bad Request — missing or invalid parameters |\n| `401` | Unauthorized — invalid or expired\
    \ bearer token |\n| `403` | Forbidden — valid token but insufficient permissions |\n| `404` | Not Found — resource does\
    \ not exist |\n| `409` | Conflict — duplicate `requestId` or state conflict |\n| `422` | Unprocessable — request is valid\
    \ but was declined by the processor |\n| `500` | Server Error — contact support if this persists |\n\n```json\n{\n  \"\
    code\": \"INVALID_PAYMENT_METHOD\",\n  \"message\": \"The card number provided is not valid.\",\n  \"details\": \"card:\
    \ fails Luhn check\"\n}\n```\n\n---\n\n## Pagination\n\nEndpoints that return lists of results support **page-based pagination**\
    \ using two parameters: `page` and `pageSize`. Depending on the endpoint, these are passed as query string parameters\
    \ (GET requests) or as fields in the request body (POST search/report requests).\n\nParameters\n\n| Parameter | Type |\
    \ Default | Description |\n|-----------|------|---------|-------------|\n| `page` | integer | `1` | The page number to\
    \ retrieve, starting at `1` |\n| `pageSize` | integer | `25` | Number of results per page |\n\nQuery string (GET endpoints)\n\
    \nReport endpoints accept pagination as query parameters:\n\n```bash\ncurl -X GET \"https://sandbox.api.example.com/v1/reports/ccdailysettlement\n\
    \  ?reportStartDate=01/01/2024\n  &reportEndDate=01/31/2024\n  &page=2\n  &pageSize=25\" \\\n  -H \"Authorization: Bearer\
    \ {token}\" \\\n  -H \"merchantToken: {merchantToken}\"\n```\n\nRequest body (POST endpoints)\n\nSearch and custom report\
    \ endpoints accept pagination in the request body:\n\n```json\n{\n  \"reportType\": \"ccTransaction\",\n  \"reportStartDate\"\
    : \"01/01/2024\",\n  \"reportEndDate\": \"01/31/2024\",\n  \"page\": 1,\n  \"pageSize\": 25\n}\n```\n\nDetecting the last\
    \ page\n\nThe API does not return envelope metadata such as `totalPages` or `hasMore`. To retrieve all results, increment\
    \ `page` until the number of records returned is less than `pageSize` — that indicates you have reached the final page.\n\
    \n```\npage 1 → 25 results  (full page, continue)\npage 2 → 25 results  (full page, continue)\npage 3 → 11 results  (partial\
    \ page, stop)\n```\n\nWhich endpoints support pagination\n\n| Resource | Endpoint | Style |\n|----------|----------|-------|\n\
    | Reports | `POST /reports` | Request body (`page`, `pageSize`) |\n| Reports | `GET /reports/*` | Query string (`page`,\
    \ `pageSize`) |\n| Invoices | `POST /invoices/search` | Request body (`pageNumber`, `pageSize`) |\n\nSingle-resource endpoints\
    \ — payments, customers, subscriptions, payment methods — return a single object or a complete list and do not paginate.\n\
    \n---\n\n## How it works\n\nEach request processes a single transaction or resource. The API is designed to be explicit\
    \ and predictable, ensuring clear outcomes for every operation.\n\n- **Sale** — Authorize and capture funds in a single\
    \ request\n- **Authorization** — Reserve funds for later capture\n- **Capture** — Complete a previously authorized transaction\n\
    - **Void** — Cancel an authorization before settlement\n- **Refund** — Return funds for a completed transaction\n- **Batch\
    \ settlement** — Group and settle transactions\n- **Subscriptions** — Manage recurring payments\n- **Payment links** —\
    \ Generate hosted payment experiences\n- **Webhooks** — Receive real-time transaction updates\n\n---\n\n## Versioning\n\
    \nThe current API version is **v1**, reflected in all endpoint paths (`/v1/...`). Breaking changes will be introduced\
    \ under a new version prefix.\n\n---\n\n## Getting started\n\n1. Obtain your `client_id`, `client_secret`, and `merchantToken`\
    \ from your your onboarding team\n2. Request a bearer token from the token endpoint\n3. Send your first payment request\
    \ to `POST /payments`"
servers:
- url: https://sandbox.api.example.com/v1
  description: Sandbox (recommended)
- url: https://api.example.com/v1
  description: Production
