openapi: 3.0.3

info:
  title: Payment Services API
  version: 1.0.0
  description: |-
    ## Overview

    A REST API for processing payments, managing customers, and handling refunds.

    ## Authentication

    All requests require a bearer token obtained via OAuth 2.0 Client Credentials.

    ```bash
    curl -X POST https://sandbox.api.example.com/oauth2/token \
      -H "Authorization: Basic BASE64_CLIENT_ID_SECRET" \
      -H "Content-Type: application/x-www-form-urlencoded" \
      -d "grant_type=client_credentials&scope=api_scope"
    ```

    Pass the token on every request:

    ```bash
    curl -X POST https://sandbox.api.example.com/v1/payments \
      -H "Authorization: Bearer YOUR_ACCESS_TOKEN" \
      -H "Content-Type: application/json" \
      -H "clientToken: YOUR_CLIENT_TOKEN"
    ```

    ## Errors

    Standard HTTP status codes are used. Error responses include a `code` and `message`.

    ```json
    {
      "code": "NOT_FOUND",
      "message": "The requested resource does not exist."
    }
    ```

servers:
  - url: https://sandbox.api.example.com/v1
    description: Sandbox
  - url: https://api.example.com/v1
    description: Production

x-tagGroups:
  - name: Payments
    tags:
      - Payments
      - Refunds
  - name: Vault
    tags:
      - PaymentMethods
  - name: Customers
    tags:
      - Customers

tags:
  - name: Customers
    description: Create and manage customer profiles.
  - name: PaymentMethods
    description: Store and manage payment instruments in the vault.
  - name: Payments
    description: Process payment transactions.
  - name: Refunds
    description: Issue refunds against completed payments.

security:
  - bearerAuth: []

paths:
  /customers:
    post:
      operationId: createCustomer
      summary: Create a customer
      tags:
        - Customers
      description: Creates a new customer profile.
      parameters:
        - $ref: '#/components/parameters/clientToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRequest'
            example:
              name: Jane Doe
              email: jane@example.com
      responses:
        '200':
          description: Customer created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
              example:
                customerId: cust_abc123
                name: Jane Doe
                email: jane@example.com
        '400':
          $ref: '#/components/responses/BadRequest'

  /customers/{customerId}:
    get:
      operationId: getCustomer
      summary: Get a customer
      tags:
        - Customers
      description: Returns the profile for a single customer.
      parameters:
        - $ref: '#/components/parameters/clientToken'
        - name: customerId
          in: path
          required: true
          schema:
            type: string
          description: The unique customer identifier.
      responses:
        '200':
          description: Customer found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
              example:
                customerId: cust_abc123
                name: Jane Doe
                email: jane@example.com
        '404':
          $ref: '#/components/responses/NotFound'

  /paymentmethods:
    post:
      operationId: createPaymentMethod
      summary: Store a payment method
      tags:
        - PaymentMethods
      description: Vaults a payment instrument for future use.
      parameters:
        - $ref: '#/components/parameters/clientToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentMethodRequest'
            example:
              customerId: cust_abc123
              type: card
              card:
                number: '4111111111111111'
                expiry: 12/27
                cvv: '737'
      responses:
        '200':
          description: Payment method stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
              example:
                paymentMethodId: pm_xyz789
                customerId: cust_abc123
                type: card
                last4: '1111'
        '400':
          $ref: '#/components/responses/BadRequest'

  /payments:
    post:
      operationId: createPayment
      summary: Create a payment
      tags:
        - Payments
      description: Processes a payment transaction.
      parameters:
        - $ref: '#/components/parameters/clientToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
            example:
              amount: 49.99
              currency: USD
              paymentMethodId: pm_xyz789
              customerId: cust_abc123
      responses:
        '200':
          description: Payment processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
              example:
                paymentId: pay_def456
                amount: 49.99
                currency: USD
                status: APPROVED
                customerId: cust_abc123
                paymentMethodId: pm_xyz789
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/Declined'

  /refunds:
    post:
      operationId: createRefund
      summary: Create a refund
      tags:
        - Refunds
      description: Issues a full or partial refund against a completed payment.
      parameters:
        - $ref: '#/components/parameters/clientToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
            example:
              paymentId: pay_def456
              amount: 49.99
      responses:
        '200':
          description: Refund issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Refund'
              example:
                refundId: ref_ghi012
                paymentId: pay_def456
                amount: 49.99
                status: APPROVED
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    clientToken:
      name: clientToken
      in: header
      required: true
      description: Your unique client identifier (GUID).
      schema:
        type: string

  schemas:
    CustomerRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          description: Full name of the customer.
        email:
          type: string
          format: email
          description: Customer email address.

    Customer:
      type: object
      properties:
        customerId:
          type: string
          description: Unique customer identifier.
        name:
          type: string
        email:
          type: string
          format: email

    PaymentMethodRequest:
      type: object
      required:
        - type
      properties:
        customerId:
          type: string
          description: Associate this payment method with a customer.
        type:
          type: string
          enum:
            - card
            - ach
          description: Payment instrument type.
        card:
          type: object
          properties:
            number:
              type: string
              description: Card number.
            expiry:
              type: string
              description: Expiration date in MM/YY format.
            cvv:
              type: string
              description: Card verification value.

    PaymentMethod:
      type: object
      properties:
        paymentMethodId:
          type: string
          description: Unique vault identifier.
        customerId:
          type: string
        type:
          type: string
          enum:
            - card
            - ach
        last4:
          type: string
          description: Last 4 digits of the card or account number.

    PaymentRequest:
      type: object
      required:
        - amount
        - currency
        - paymentMethodId
      properties:
        amount:
          type: number
          description: Amount to charge.
        currency:
          type: string
          description: ISO 4217 currency code.
          example: USD
        paymentMethodId:
          type: string
          description: Vaulted payment method to charge.
        customerId:
          type: string
          description: Customer associated with this payment.

    Payment:
      type: object
      properties:
        paymentId:
          type: string
          description: Unique payment identifier.
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
          enum:
            - APPROVED
            - DECLINED
        customerId:
          type: string
        paymentMethodId:
          type: string

    RefundRequest:
      type: object
      required:
        - paymentId
      properties:
        paymentId:
          type: string
          description: The payment to refund.
        amount:
          type: number
          description: Amount to refund. Defaults to the full payment amount if omitted.

    Refund:
      type: object
      properties:
        refundId:
          type: string
          description: Unique refund identifier.
        paymentId:
          type: string
        amount:
          type: number
        status:
          type: string
          enum:
            - APPROVED
            - DECLINED

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Bad request — missing or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: BAD_REQUEST
            message: The field "amount" is required.

    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: NOT_FOUND
            message: The requested resource does not exist.

    Declined:
      description: The transaction was declined by the processor.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: DECLINED
            message: Insufficient funds.
