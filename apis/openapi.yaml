      summary: Retrieve all customers
      description: 'Returns all customer profiles for the merchant, including each customer''s vaulted payment

        methods (`vaults`) and active subscriptions (`subscriptions`). This endpoint returns the full

        dataset with no pagination — for merchants with large customer bases, response payload may be

        significant. Use `GET /customers/{customerId}` to retrieve a single record.'
