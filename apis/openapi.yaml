tags:
- name: Payments
  description: "The Payments resource in the Payment Services API is a robust service designed to manage the full lifecycle\
    \ of payment transactions. It supports operations including creating, canceling, authorizing, completing, and searching\
    \ payments. This resource ensures secure, reliable, and flexible processing, making it suitable for diverse scenarios\
    \ such as retail transactions, billing, and tipping.\n\nThe Payments API handles various transaction types and workflows\
    \ with multiple payment methods such as cards, ACH with accounts, stored vaults, cryptograms, and tokens—including card,\
    \ ACH, and NetworkToken. It offers granular control over each stage of the process. Whether initiating a sale, reserving\
    \ funds, finalizing a transaction, or voiding a payment, this resource provides endpoints to streamline operations and\
    \ maintain integrity.\n\n## The Payment Request Object\n\n| Field | Type | Required | Description |\n|-------|------|----------|-------------|\n\
    | amount.amount | number | ✓ | Transaction amount (e.g. `50.00`) |\n| amount.currency | string | ✓ | ISO 4217 currency\
    \ code (e.g. `USD`) |\n| paymentMethod | object | ✓ | Exactly one payment method — `card`, `ach`, `vault`, `token`, `cryptogram`,\
    \ `networkToken`, `achToken`, or `fleetCard` |\n| orderId | string | | Merchant-assigned order identifier. Auto-generated\
    \ if omitted |\n| customerId | integer | | Associate transaction with an existing customer record |\n| tipAmount.amount\
    \ | number | | Tip amount added to the transaction |\n| tipAmount.currency | string | | Currency for the tip (e.g. `USD`)\
    \ |\n| customData | array | | Array of `{ name, value }` pairs passed through and echoed in the response |\n| orderData\
    \ | object | | Level 2/3 line-item detail for enhanced interchange |\n| isPartialAllowed | boolean | | If `true`, accept\
    \ a partial approval when full amount is unavailable |\n\n```json\n{\n  \"amount\": { \"amount\": 50.00, \"currency\"\
    : \"USD\" },\n  \"paymentMethod\": {\n    \"card\": {\n      \"card\": \"4111111111111111\",\n      \"expiry\": \"11/26\"\
    ,\n      \"cvv\": \"737\"\n    }\n  },\n  \"orderId\": \"ORD-2024-001\",\n  \"customerId\": 98765,\n  \"tipAmount\": {\
    \ \"amount\": 5.00, \"currency\": \"USD\" },\n  \"customData\": [\n    { \"name\": \"invoiceNumber\", \"value\": \"INV-001\"\
    \ }\n  ],\n  \"isPartialAllowed\": false\n}\n```"
- name: Refunds
  description: 'The Refunds resource in the Payment Services API is designed to handle various refund scenarios with flexibility
    and security. It supports operations for processing standard, standalone, vault-based, and EMV-based refunds, ensuring
    seamless integration with diverse payment workflows.


    This resource enables businesses to manage post-transaction adjustments efficiently, whether initiated due to customer
    requests, service changes, or reconciliation needs. It supports multiple payment methods and refund types, offering granular
    control and compliance with industry standards.


    ## The Refund Object


    | Field | Type | Description |

    |-------|------|-------------|

    | paymentId | string (UUID) | UUID of the refund transaction |

    | parentPaymentId | string (UUID) | UUID of the original transaction this refund is applied against |

    | requestId | string (UUID) | Unique identifier for this API request |

    | orderId | string | Order identifier associated with this refund |

    | amountApproved | number | Amount approved for the refund |

    | batchNumber | string | Settlement batch number this refund belongs to |

    | authResponse | string | Refund result: `APPROVED`, `DECLINED`, or `ERROR` |

    | responseCode | string | Processor response code for the refund operation |

    | responseMessage | string | Human-readable message describing the refund result |

    | isPartial | boolean | True if only part of the requested refund amount was approved |

    | token | string | Vault token representing the payment method used |

    | accountResponseData | object | AVS and CVV verification result codes from the processor |'
- name: PaymentMethods
  description: 'The Payment Methods resource in the Payment Services API enables businesses to manage customer payment instruments
    securely and efficiently. It supports operations for creating, updating, validating, and tokenizing payment methods, as
    well as checking applicable surcharges and device status. This resource plays a vital role in enabling smooth and secure
    transactions across various payment workflows.


    It supports multiple payment types including cards, ACH, stored vaults, cryptograms, and tokens, making it suitable for
    a wide range of business scenarios such as retail, subscriptions, logistics, and service-based payments.


    ## The Payment Method Object


    | Field | Type | Description |

    |-------|------|-------------|

    | paymentMethodId | string (UUID) | UUID of the newly created or updated vaulted payment method |

    | customerId | integer | Numeric ID of the customer associated with this payment method |

    | requestId | string (UUID) | Unique identifier for this API request |'
- name: Customers
  description: 'The Customers resource in the Payment Services API enables businesses to manage customer profiles and associated
    payment data efficiently. It supports operations for creating, updating customer records, and retrieving stored details
    along with payment methods and active subscriptions. This resource plays a central role in enabling personalized and secure
    payment experiences across various business workflows.


    ## The Customer Object


    | Field | Type | Description |

    |-------|------|-------------|

    | customerId | integer | Numeric ID of the newly created customer record |

    | paymentMethodId | array[string] | UUIDs of vaulted payment methods associated with this customer |

    | requestId | string (UUID) | Unique identifier for this API request |'
security:
- oauth2ClientCredentials:
  - api_scope
paths:
  /payments:
    post:
      operationId: createPayment
      summary: Create a payment (sale or debit)
      description: 'Submits a payment transaction that immediately authorizes and captures funds in a single step

        (sale). Supply exactly one payment method type in the `paymentMethod` object — `card`, `ach`,

        `vault`, `token`, `cryptogram`, `networkToken`, `achToken`, or `fleetCard`. The response includes

        a `paymentId` which is the primary identifier for all subsequent operations (cancel, refund,

        search). If `orderId` is omitted, the platform assigns one. For ACH payments, settlement is

        asynchronous and the `authResponse` reflects submission, not final settlement. To reserve funds

        without capturing, use `POST /payments/authorize` instead.'
      tags:
      - Payments
      x-codeSamples:
      - lang: cURL
        label: cURL
        source: "curl -X POST https://sandbox.api.example.com/v1/payments \\\n  -H \"Authorization: Bearer {token}\" \\\n\
          \  -H \"Content-Type: application/json\" \\\n  -H \"merchantToken: {merchantToken}\" \\\n  -d '{\n    \"amount\"\
          : { \"amount\": 50.00, \"currency\": \"USD\" },\n    \"paymentMethod\": {\n      \"card\": {\n        \"card\":\
          \ \"4111111111111111\",\n        \"expiry\": \"11/26\",\n        \"cvv\": \"737\"\n      }\n    }\n  }'"
      parameters:
      - $ref: '#/components/parameters/merchantToken'
      - $ref: '#/components/parameters/requestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
            examples:
              card:
                summary: Card payment
                value:
                  amount:
                    amount: 50.0
                    currency: USD
                  paymentMethod:
                    card:
                      card: '4111111111111111'
                      expiry: 11/26
                      cvv: '737'
              ach:
                summary: ACH payment
                value:
                  amount:
                    amount: 50.0
                    currency: USD
                  paymentMethod:
                    ach:
                      accountNumber: '12345678901'
                      routingNumber: '021000021'
                      accountType: Checking
              vault:
                summary: Vault payment
                value:
                  amount:
                    amount: 50.0
                    currency: USD
                  paymentMethod:
                    vault:
                      paymentMethodId: c9d8e7f6-a5b4-3c2d-1e0f-9a8b7c6d5e4f
                      cvv: '737'
              networkToken:
                summary: Network token payment
                value:
                  amount:
                    amount: 50.0
                    currency: USD
                  paymentMethod:
                    networkToken:
                      token: '4895370012345678'
                      expiryMonth: '11'
                      expiryYear: '2026'
                      secureCavvData: AAABCSIIAAAAAAACcwgAEMCoNh==
                      tokenSource: APPLEPAY
      responses:
        '200':
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
              examples:
                approved:
                  summary: Approved payment
                  value:
                    isPartial: false
                    orderId: ORD-20240115-001
                    customerId: 98765
                    batchNumber: BATCH-001
                    subscriptionId: null
                    fee:
                      feeAmount: 1.25
                      feeAuthResponse: null
                    token: tok_4111111111111
                    accountResponseData:
                      avs: Y
                      cvv: M
                    amountApproved: 50.0
                    authResponse: APPROVED
                    responseCode: '0'
                    responseMessage: Approved
                    paymentId: d4e5f6a7-b8c9-0123-def0-123456789012
                    requestId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
        '406':
          description: Not Acceptable
        '408':
          description: Request Timeout
        '415':
          description: Unsupported Media Type
        '429':
          description: Too Many Requests
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Not Implemented
        '503':
          description: Service Unavailable
        '504':
          description: Gateway Timeout
        '505':
          description: HTTP Version Not Supported
        '506':
          description: Variant Also Negotiates
        '507':
          description: Insufficient Storage
        '508':
          description: Loop Detected
        '510':
          description: Not Extended
        '511':
          description: Network Authentication Required
  /refunds:
    post:
      operationId: createRefund
      summary: Create a refund, credit, or standalone refund
      description: 'Processes a refund using one of three variants determined by the fields supplied.


        **Standard Refund** — Supply `paymentId` to refund against a prior transaction. The `amount` can

        be less than the original (partial refund). Omit `amount` to refund the full original amount.

        Set `isACH: true` for ACH transactions.


        **ACH Credit** — Supply `paymentMethod.ach` without a `paymentId` to push a direct credit to a

        bank account with no prior payment reference.


        **Standalone Refund** — Supply `paymentMethod` (card, vault, or cryptogram) without a `paymentId`

        to return funds directly to a payment instrument without referencing an original transaction.


        **Gotcha:** You cannot refund a voided transaction (400 error). You cannot refund more than the

        original transaction amount. Refunds against settled transactions are processed as credits in the

        next batch.'
      tags:
      - Refunds
      parameters:
      - $ref: '#/components/parameters/merchantToken'
      - $ref: '#/components/parameters/requestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundUnion'
            examples:
              standard:
                summary: Standard refund against a payment
                value:
                  paymentId: d4e5f6a7-b8c9-0123-def0-123456789012
                  amount:
                    amount: 25.0
                    currency: USD
                  isACH: false
              achCredit:
                summary: ACH credit
                value:
                  amount:
                    amount: 50.0
                    currency: USD
                  paymentMethod:
                    ach:
                      accountNumber: '12345678901'
                      routingNumber: '021000021'
                      accountType: Checking
              standalone:
                summary: Standalone vault refund
                value:
                  amount:
                    amount: 30.0
                    currency: USD
                  paymentMethod:
                    vault:
                      paymentMethodId: c9d8e7f6-a5b4-3c2d-1e0f-9a8b7c6d5e4f
                      cvv: '737'
      responses:
        '200':
          description: Refund processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
              examples:
                approved:
                  summary: Refund approved
                  value:
                    amountApproved: 25.0
                    authResponse: APPROVED
                    batchNumber: BATCH-001
                    responseCode: '0'
                    orderId: ORD-20240115-001
                    parentPaymentId: d4e5f6a7-b8c9-0123-def0-123456789012
                    responseMessage: Refund approved
                    paymentId: e5f6a7b8-c9d0-1234-ef01-234567890123
                    requestId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
        '406':
          description: Not Acceptable
        '408':
          description: Request Timeout
        '415':
          description: Unsupported Media Type
        '429':
          description: Too Many Requests
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Not Implemented
        '503':
          description: Service Unavailable
        '504':
          description: Gateway Timeout
        '505':
          description: HTTP Version Not Supported
        '506':
          description: Variant Also Negotiates
        '507':
          description: Insufficient Storage
        '508':
          description: Loop Detected
        '510':
          description: Not Extended
        '511':
          description: Network Authentication Required
  /paymentmethods:
    post:
      operationId: createPaymentMethod
      summary: Create (vault) a payment method
      description: 'Creates a new vault entry, storing a payment instrument securely on the platform. Supports

        `card`, `ach`, `token`, `achToken`, `cryptogram`, and `fleetCard` payment method types.

        Optionally associate the vault entry with an existing customer by supplying `customerId`. Returns

        a `paymentMethodId` (GUID) that replaces raw payment data in future `POST /payments`,

        `POST /subscriptions`, and `POST /refunds` calls using the `vault` payment method type.'
      tags:
      - PaymentMethods
      parameters:
      - $ref: '#/components/parameters/merchantToken'
      - $ref: '#/components/parameters/requestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentMethodRequest'
            examples:
              card:
                summary: Vault a card
                value:
                  customerId: 98765
                  paymentMethod:
                    card:
                      card: '4111111111111111'
                      expiry: 11/26
                      cvv: '737'
                      accNickName: My Visa
                      isActive: true
                      billingAddress:
                        postalCode: '12345'
                        firstName: Jane
                        lastName: Doe
                        address: 123 Main St
                        city: Springfield
                        state: IL
                        country: US
              ach:
                summary: Vault an ACH account
                value:
                  customerId: 98765
                  paymentMethod:
                    ach:
                      accountNumber: '12345678901'
                      routingNumber: '021000021'
                      accountType: Checking
                      accNickName: Primary Checking
                      isActive: true
      responses:
        '200':
          description: Payment method created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethodResponse'
              examples:
                created:
                  summary: Payment method created
                  value:
                    paymentMethodId: c9d8e7f6-a5b4-3c2d-1e0f-9a8b7c6d5e4f
                    customerId: 98765
                    requestId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
        '406':
