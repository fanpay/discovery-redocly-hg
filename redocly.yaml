logo:
  image: ./images/logo.png
seo:
  siteUrl: https://testing-redocly-local.redocly.app/
  llmstxt:
    # Points to a specific markdown file that gives the AI system-level instructions
    details: 
      path: "./llms-details.md"
    # Exclude internal or draft content from being indexed by AI
    # Group your content logically for the AI
    sections:
      - title: "About"
        includeFiles:
          - "about.md"
footer:
  items:
    - group: Redocly
      items:
        - href: https://redocly.com
          label: Redocly.com
        - href: https://redocly.com/docs
          label: Redocly docs
    - group: Docs Resources
      items:
        - href: https://markdoc.dev/
          label: Markdoc
        - href: https://openapis.org
          label: OpenAPI
aiAssistant:
  trigger:
    hide: true
    inputType: button
    inputIcon: redocly