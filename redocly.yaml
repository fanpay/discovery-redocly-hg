# =============================================================================
# Redocly project config — Agent-Ready API Documentation Platform
# =============================================================================
# Single Realm/Reunite project. The OpenAPI specs are the source of truth;
# this file wires up the quality bar, the API list, and the agent interface.
# See docs/ideas/agent-ready-api-docs.md for the why.
# =============================================================================

# Day-to-day `redocly lint` enforces the full agent-ready bar (defined once,
# in rulesets/agent-ready.yaml).
extends:
  - ./rulesets/agent-ready.yaml

apis:
  # One entry per product. Start with a single pilot, then add the rest.
  # `example-product` is a runnable placeholder — replace with the real spec.
  example-product@v1:
    root: ./apis/example-product/openapi.yaml

# --- Agent interface --------------------------------------------------------
# Realm auto-generates an MCP server at /mcp — the primary way AI agents
# consume these docs (the real agent path, not llms.txt). Default-on; shown
# explicitly so the team knows the knob exists.
mcp:
  hide: false

# --- Publish gate (Scorecard) ----------------------------------------------
# Ordered lowest -> highest. An API earns the highest level it passes with no
# errors. CI gates publish on `Agent-Ready`:
#   redocly scorecard-classic --target-level Agent-Ready --format junit
# NOTE: scorecardClassic requires a paid Redocly project (Pro/Enterprise) and
# authentication. Verify the level/ruleset syntax against the live
# `configure-scorecard` guide before relying on it in CI.
scorecardClassic:
  levels:
    - name: Baseline
      extends:
        - minimal
    - name: Reference-Ready
      extends:
        - recommended
    - name: Agent-Ready
      extends:
        - ./rulesets/agent-ready.yaml
