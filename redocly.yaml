logo:
  image: ./images/logo.png

# Role-Based Access Control (RBAC)
# Roles: business, internal, developers, ai-agents
# Permissions: read (can view) | none (no access, page is hidden and blocked)
rbac:
  defaults:
    anonymous: none
    authenticated: read
  content:
    # Root-level pages: all authenticated users
    'index.md':
      anonymous: read
      business: read
      internal: read
      developers: read
      ai-agents: read
    'about.md':
      anonymous: read
      business: read
      internal: read
      developers: read
      ai-agents: read
    # Style guide: internal team and developers only
    'style-guide.md':
      business: none
      internal: read
      developers: read
      ai-agents: none
    # Business section: business + internal + developers
    'business/**':
      anonymous: none
      business: read
      internal: read
      developers: read
      ai-agents: none
    # Internal section: internal + developers only
    'internal/**':
      anonymous: none
      business: none
      internal: read
      developers: read
      ai-agents: none
    # Developers section: developers + internal + ai-agents (API consumers)
    'developers/**':
      anonymous: none
      business: none
      internal: read
      developers: read
      ai-agents: read
    # AI Agents section: ai-agents + developers + internal
    'ai-agents/**':
      anonymous: none
      business: none
      internal: read
      developers: read
      ai-agents: read
    # API reference: developers, internal, and ai-agents only
    'apis/**':
      anonymous: none
      business: none
      internal: read
      developers: read
      ai-agents: read

