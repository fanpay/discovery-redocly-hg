seo:
  title: Payment Services Developer Portal
  description: API documentation, guides, and technical references for the Payment Services platform.

logo:
  image: ./images/logo.png

plugins:
  - ./rulesets/plugins/string-schemas-length-defined.cjs

extends:
  - ./rulesets/agent-ready.yaml

# --- Build / link-checker exclusions ----------------------------------------
# The `sample-invalid-*` files under docs/examples/ intentionally contain
# broken/empty links and other violations to demonstrate the linting setup.
# Redocly's link checker has no per-file exception (only a global
# `reunite.ignoreLinkChecker` toggle), so we exclude these demo files from the
# build instead — which also keeps them out of the link checker.
# Mirrors the `docs/**/sample-invalid-*.md` ignore in .markdownlint-cli2.yaml.
ignore:
  - 'docs/examples/sample-invalid-*.md'

# --- Navbar -------------------------------------------------------------------
# The default theme allows ONE level of grouping: a top-level `group` may hold
# leaf links via `items`, but those items cannot themselves be groups (no
# nested dropdowns). Top-level entries can be plain links or single-level groups.
navbar:
  items:
    # Level 1 — plain top-level link
    - label: Guides
      page: docs/guides/index.md

    # Level 1 group -> Level 2 leaf links (the only supported nesting)
    - group: API Reference
      icon: code
      items:
        - label: Payment Services
          page: apis/index.md
        - label: Discovery Node
          page: apis/index.md
        - label: Discovery Python
          page: apis/index.md

    # Level 1 — external link
    - label: Redocly Docs
      href: https://redocly.com/docs
      external: true

    - label: About
      page: about.md

# Register API specifications.
# Use the pattern <name>@<version> for each API.
# Remote specs can be added as: root: https://example.com/openapi.yaml
# This is useful for lint and scorecard checks, and for generating the API Reference sidebar.
apis:
  payment-services@v1.0:
    root: ./apis/sample-api/@v1.0/openapi.yaml
  discovery-node@v1.0:
    root: https://raw.githubusercontent.com/fanpay/discovery-node-redocly/main/openapi/openapi.yaml
  discovery-python@v1.0:
    root: https://raw.githubusercontent.com/fanpay/discovery-python-redocly/main/docs/openapi.yaml

# --- Agent interface --------------------------------------------------------
# Realm auto-generates an MCP server at /mcp — the primary way AI agents
# consume these docs (the real agent path, not llms.txt). Default-on; shown
# explicitly so the team knows the knob exists.
mcp:
  hide: false

aiAssistant:
  trigger:
    hide: false
    inputType: button
    inputIcon: redocly

# --- Search -----------------------------------------------------------------
# Custom `filters.facets` require the Typesense engine (Enterprise/Enterprise+);
# under the default FlexSearch engine this whole block is ignored.
# Each facet aggregates the SCALAR value of its `field` from every page's
# `metadata` block — one value per page. `multi-select`/`select` controls how
# many of those distinct values a user can pick in the dialog; they do NOT mean
# a single page can hold a list. A YAML list in a page's metadata is flattened
# into one comma-joined chip, so keep page values scalar.
search:
  engine: typesense
  shortcuts:
      - ctrl+k
  filters:
    facets:
      - name: Topics
        field: topics       # scalar per page; matches metadata.topics
        type: multi-select
      - name: Page Type
        field: page_type    # scalar per page; matches metadata.page_type
        type: multi-select

# --- Publish gate (Scorecard) ----------------------------------------------
# Ordered lowest -> highest. An API earns the highest level it passes with no
# errors. CI gates publish on `Agent-Ready`:
#   redocly scorecard-classic --target-level Agent-Ready --format junit
# NOTE: scorecardClassic requires a paid Redocly project (Pro/Enterprise) and
# authentication. Verify the level/ruleset syntax against the live
# `configure-scorecard` guide before relying on it in CI.
scorecardClassic:
  levels:
    - name: Baseline
      extends:
        - minimal
    - name: Reference-Ready
      extends:
        - recommended
    - name: OpenAPI-Ready
      extends:
        - ./rulesets/openapi-rules.yaml

# --- Footer -------------------------------------------------------------------
# The footer is a global site-wide component. It is not part of the API spec.
footer:
  items:
    - group: Developer Resources
      items:
        - href: https://redocly.com/docs
          label: Redocly Docs
        - href: https://openapis.org
          label: OpenAPI Initiative
    - group: Company
      items:
        - href: https://redocly.com
          label: Redocly.com
