logo:
  image: ./images/logo.png

footer:
  items:
    - group: Redocly
      items:
        - href: https://redocly.com
          label: Redocly.com
        - href: https://redocly.com/docs
          label: Redocly docs
    - group: Docs Resources
      items:
        - href: https://markdoc.dev/
          label: Markdoc
        - href: https://openapis.org
          label: OpenAPI

aiAssistant:
  trigger:
    hide: true
    inputType: button
    inputIcon: redocly

apis:
  museum@v1:
    root: ./apis/openapi.yaml
    x-servers-override:
      - url: "https://staging-api.museum.example.com/v1"
        description: Staging server

seo:
  noindex: true

envName: staging
